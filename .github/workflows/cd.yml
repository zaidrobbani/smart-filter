name: CD

on:
  push:
    branches: [main]

# Hanya jalankan CD setelah CI selesai & lulus
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash << 'ENDSSH'
            set -e
            cd /var/www/smart-filter

            echo "==> [1/4] Pull kode terbaru..."
            git pull origin main

            echo "==> [2/4] Build Docker image baru..."
            docker compose -f docker-compose.prod.yml build app

            echo "==> [3/4] Restart container app (zero-downtime)..."
            docker compose -f docker-compose.prod.yml up -d --no-deps app

            echo "==> [4/4] Bersihkan image lama..."
            docker image prune -f

            echo "==> Deploy selesai!"
          ENDSSH